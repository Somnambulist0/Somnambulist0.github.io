<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文标题</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1, h2, h3 {
            color: #333;
        }
        p {
            text-align: justify;
        }
        .author {
            font-style: italic;
        }
        .abstract {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }
        .references {
            margin-top: 30px;
        }
        .references li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>论文标题</h1>
    <p class="author">作者姓名</p>

    <h2>摘要</h2>
    <div class="abstract">
        <p>这里是摘要内容...</p>
    </div>

    <h2>引言</h2>
    <p>这里是引言内容...</p>

    <h2>章节标题</h2>
    <p>这里是章节内容...</p>

    <h2>参考文献</h2>
    <ul class="references">
        <li>[1] 参考文献1...</li>
        <li>[2] 参考文献2...</li>
        <!-- 更多参考文献... -->
    </ul>
</body>
</html>
