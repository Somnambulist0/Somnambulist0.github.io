<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷色调的炫酷网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #34495e;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            transition: all 0.3s;
        }

        nav:hover {
            background-color: #34495e;
        }

        nav a {
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
        }

        nav a:hover {
            background-color: #1abc9c;
        }

        .card-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            width: 30%;
            padding: 20px;
            border: 1px solid #1abc9c;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 50%;
            padding: 20px;
            background-color: #34495e;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            cursor: pointer;
        }

    </style>
</head>

<body>

    <header>
        <h1>冷色调的炫酷网页</h1>
    </header>

    <nav>
        <a href="#">首页</a>
        <a href="#">关于</a>
        <a href="#">服务</a>
        <a href="#">联系</a>
    </nav>

    <div class="card-container">
        <div class="card">
            <h2>标题1</h2>
            <p>这是一些内容。</p>
            <button onclick="showModal()">查看更多</button>
        </div>
        <div class="card">
            <h2>标题2</h2>
            <p>这是一些内容。</p>
        </div>
        <div class="card">
            <h2>标题3</h2>
            <p>这是一些内容。</p>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">X</span>
            <h2>模态内容</h2>
            <p>这是一个模态对话框的内容。</p>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>

</html>
